<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#141a2e" />
    <meta
      name="description"
      content="Pair Fire Emblem Awakening characters and explore marriages, supports, children, and builds."
    />
    <title>Fire Emblem Awakening Matchmaker</title>
    <script>
      // Apply theme before first paint to prevent a flash of the wrong theme.
      (function () {
        try {
          var saved = localStorage.getItem('fe-theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (saved === 'dark' || (!saved && prefersDark)) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
